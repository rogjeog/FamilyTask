services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR escapes compose interpolation → resolves inside container
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ─── Applications ─────────────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      APP_NAME: ${APP_NAME:-FamilyTask}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
    volumes:
      # Source (bind) — hot reload watches these
      - ./apps/backend:/app/apps/backend
      - ./packages/shared:/app/packages/shared
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      # Named volumes overlay node_modules — preserves image-installed deps
      - backend_node_modules:/app/apps/backend/node_modules
      - root_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-FamilyTask}
    volumes:
      # Source (bind)
      - ./apps/web:/app/apps/web
      - ./packages/shared:/app/packages/shared
      - ./package.json:/app/package.json:ro
      - ./pnpm-workspace.yaml:/app/pnpm-workspace.yaml:ro
      # Named volumes for deps and Next.js build cache
      - web_node_modules:/app/apps/web/node_modules
      - web_next:/app/apps/web/.next
      - root_node_modules:/app/node_modules
    depends_on:
      - api

# ─── Named volumes ───────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  web_node_modules:
  web_next:
  root_node_modules:
